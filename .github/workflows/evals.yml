name: RAG Eval Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    name: Run LangSmith Evals

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval suite
        run: python src/evals/run_evals.py --fail-below 0.80
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "enterprise-rag-agent-ci"
          QDRANT_URL: "http://localhost:6333"

      - name: Comment eval results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ RAG Eval suite passed. [View results in LangSmith](https://smith.langchain.com)'
            })
